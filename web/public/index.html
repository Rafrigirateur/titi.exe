<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOCOLE JUPITER - SYSTEME TITI.EXE</title>
    <style>
        /* --- STYLE BRUTALISTE & MILITAIRE --- */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --color-danger: #ff0000;
            --color-safe: #00ff00;
            --color-bg: #000000;
            --color-text: #ff3333;
            --glow: 0 0 10px rgba(255, 0, 0, 0.7);
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            position: relative;
            transition: background-color 0.1s; /* Pour l'effet de flash */
        }

        /* --- EFFET SCANLINE --- */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
            opacity: 0.3;
        }

        /* --- CONTENEUR PRINCIPAL --- */
        #console-container {
            border: 2px solid var(--color-text);
            padding: 20px;
            width: 95%;
            max-width: 650px;
            box-shadow: var(--glow);
            position: relative;
            background: rgba(10, 0, 0, 0.85);
            max-height: 95vh;
            display: flex;
            flex-direction: column;
        }

        #header {
            text-align: center;
            border-bottom: 2px solid var(--color-text);
            padding-bottom: 10px;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        #status-display {
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
            padding: 5px;
            border: 1px dashed var(--color-text);
            flex-shrink: 0;
        }

        .status-active { color: var(--color-danger); text-shadow: var(--glow); animation: blink 0.5s infinite; }
        .status-inactive { color: #555; }

        /* --- LISTE DES SALONS SÉLECTIONNÉS --- */
        #selected-channels-container {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid var(--color-text);
            background: #0a0000;
            padding: 5px;
            margin-bottom: 10px;
            min-height: 150px;
            max-height: 35vh;
        }

        .channel-item {
            border: 1px dashed #550000;
            padding: 10px;
            margin-bottom: 5px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .channel-item.active-target {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid var(--color-danger);
        }

        .channel-name { font-weight: bold; font-size: 1.1em; padding-right: 30px; }
        
        .channel-users { font-size: 0.85em; color: #aaa; margin-top: 4px; text-transform: none; }

        /* --- BOUTON SUPPRIMER --- */
        .remove-btn {
            position: absolute; top: 10px; right: 10px;
            background: transparent; border: 1px solid var(--color-danger);
            color: var(--color-danger); font-family: 'Share Tech Mono', monospace;
            cursor: pointer; padding: 2px 6px; font-size: 1em; font-weight: bold; transition: all 0.2s;
        }
        .remove-btn:hover { background: var(--color-danger); color: var(--color-bg); }

        /* --- CONTRÔLES --- */
        .radar-controls {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 5px; flex-shrink: 0;
        }

        .radar-btn {
            background: transparent; border: 1px solid var(--color-text);
            color: var(--color-text); padding: 5px 10px;
            cursor: pointer; font-family: 'Share Tech Mono', monospace; transition: all 0.2s;
        }
        .radar-btn:hover { background: var(--color-danger); color: var(--color-bg); }

        .add-target-btn { width: 100%; border-style: dashed; margin-bottom: 15px; padding: 10px; font-size: 1.1em; flex-shrink: 0; }

        /* --- LE GROS BOUTON --- */
        #fire-button-container { text-align: center; flex-shrink: 0; }

        #fire-button {
            background-color: #330000; border: 4px solid var(--color-danger);
            color: var(--color-danger); font-family: 'Share Tech Mono', monospace;
            font-size: 1.8em; font-weight: bold; padding: 15px 30px; cursor: pointer;
            text-transform: uppercase; box-shadow: var(--glow); transition: all 0.2s; width: 100%;
        }

        #fire-button:hover { background-color: var(--color-danger); color: var(--color-bg); box-shadow: 0 0 20px var(--color-danger); }
        #fire-button:active { transform: scale(0.98); }
        #fire-button.active-mode { background-color: var(--color-bg); border-color: #444; color: #444; box-shadow: none; }
        #fire-button.active-mode:hover { background-color: #222; }

        /* --- MODAL --- */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center;
            z-index: 500; backdrop-filter: blur(3px);
        }

        #modal-content {
            border: 2px solid var(--color-danger); background: #050000;
            width: 90%; max-width: 600px; max-height: 80vh; display: flex;
            flex-direction: column; padding: 15px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        #modal-radar-container { flex-grow: 1; overflow-y: auto; border: 1px solid var(--color-text); background: #0a0000; padding: 5px; margin-top: 10px; }

        .modal-item { border: 1px dashed #550000; padding: 10px; margin-bottom: 5px; cursor: pointer; display: flex; flex-direction: column; }
        .modal-item:hover { background: rgba(255, 0, 0, 0.1); border-color: var(--color-danger); }
        .modal-item.selected { background: var(--color-danger); color: var(--color-bg); border: 1px solid var(--color-danger); box-shadow: var(--glow); }
        .modal-item.selected .channel-users { color: #330000; font-weight: bold; }

        /* --- FORMULAIRES --- */
        input[type="text"], input[type="password"] {
            width: 100%; background-color: #1a0000; border: 1px solid var(--color-text);
            color: var(--color-danger); font-family: 'Share Tech Mono', monospace; padding: 10px; box-sizing: border-box; font-size: 1em;
        }
        input[type="password"] { font-size: 1.2em; text-align: center; letter-spacing: 5px; }
        input:focus { outline: none; box-shadow: var(--glow); }

        @keyframes blink { 50% { opacity: 0; } }
        .hidden { display: none !important; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; font-size: 2em; color: var(--color-danger); text-align: center;
        }
        .loader-text { margin-top: 20px; font-size: 0.6em; color: #aaa; animation: blink 1s infinite;}
    </style>
</head>
<body>

    <div id="loading-overlay" class="hidden">
        <div id="loading-main-text">TRAITEMENT EN COURS...</div>
        <div class="loader-text" id="loading-sub-text">Attente de réponse du système Jupiter</div>
    </div>

    <div id="modal-overlay" class="hidden">
        <div id="modal-content">
            <div class="radar-controls">
                <label>BASE DE DONNÉES RADAR</label>
                <button class="radar-btn" onclick="closeModal()">FERMER [X]</button>
            </div>
            <input type="text" id="modal-search-input" placeholder="FILTRER : SERVEUR, SALON OU CIBLE..." oninput="renderModalList()">
            <div id="modal-radar-container"></div>
        </div>
    </div>

    <div id="console-container">
        <div id="header">
            <div>République Française</div>
            <div style="font-size: 1.2em; font-weight: bold;">COMMANDEMENT DES FORCES STRATÉGIQUES</div>
            <div style="color:white">-- CONFIDENTIEL DÉFENSE --</div>
            <div>PC Jupiter - Système "TITI.EXE"</div>
        </div>

        <div id="auth-section">
            <div class="input-group">
                <label style="text-align:center;">CODE D'AUTORISATION REQUIS :</label>
                <input type="password" id="pin-input" placeholder="XXXXXX" maxlength="20">
            </div>
            <button id="fire-button" style="font-size:1.2em; padding: 10px;" onclick="authenticate()">DÉVERROUILLER</button>
        </div>

        <div id="control-panel" class="hidden" style="display: flex; flex-direction: column; flex-grow: 1;">
            <div id="status-display">
                État du Système : <span id="status-text" class="status-inactive">STANDBY</span>
            </div>

            <div class="radar-controls">
                <label>SECTEURS VERROUILLÉS :</label>
                <button class="radar-btn" onclick="fetchRadarData()">📡 ACTUALISER</button>
            </div>

            <div id="selected-channels-container">
                <div style="text-align: center; padding: 20px; color: #555;">EN ATTENTE DES DONNÉES SATELLITES...</div>
            </div>

            <button class="radar-btn add-target-btn" onclick="openModal()">[+] ASSIGNER UNE NOUVELLE CIBLE</button>

            <div id="manual-strike-container" class="hidden" style="margin-bottom: 15px;">
                <button class="radar-btn" style="width: 100%; border-color: #ffaa00; color: #ffaa00; font-size: 1.2em; padding: 10px; font-weight: bold; background: rgba(255, 170, 0, 0.1);" onclick="forcePing()">
                    ⚠️ ORDONNER UN TIR MANUEL
                </button>
            </div>

            <div id="fire-button-container">
                <button id="fire-button" class="arm-mode" onclick="toggleSystem()">
                    ARMEZ LE SYSTÈME
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/dashboard/api';
        let userPin = '';
        let isSystemActive = false;
        let selectedChannelIds = new Set(); 
        let radarChannels = []; 

        const authSection = document.getElementById('auth-section');
        const controlPanel = document.getElementById('control-panel');
        const pinInput = document.getElementById('pin-input');
        const statusText = document.getElementById('status-text');
        const fireButton = document.getElementById('fire-button');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingMainText = document.getElementById('loading-main-text');
        
        const selectedContainer = document.getElementById('selected-channels-container');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalContainer = document.getElementById('modal-radar-container');
        const modalSearchInput = document.getElementById('modal-search-input');
        const manualStrikeContainer = document.getElementById('manual-strike-container');

        function authenticate() {
            userPin = pinInput.value.trim();
            if (!userPin) { alert("ERREUR : CODE REQUIS."); return; }
            showLoading("DÉVERROUILLAGE SÉCURISÉ...");
            authSection.classList.add('hidden');
            controlPanel.classList.remove('hidden');
            initDashboard();
        }

        async function initDashboard() {
            try {
                const statusRes = await fetch(`${API_BASE_URL}/status`);
                if (!statusRes.ok) throw new Error("Erreur de liaison");
                const statusData = await statusRes.json();
                
                isSystemActive = statusData.isActive;
                selectedChannelIds = new Set(statusData.allowedChannels);
                
                updateUIStatus();
                await fetchRadarData();
            } catch (e) {
                hideLoading();
                alert("CONNEXION AU PC JUPITER PERDUE.");
                window.location.reload();
            }
        }

        async function fetchRadarData() {
            showLoading("BALAYAGE SATELLITE EN COURS...");
            try {
                const response = await fetch(`${API_BASE_URL}/radar`, { headers: { 'X-PIN': userPin } });
                if (!response.ok) {
                    if(response.status === 401) throw new Error("PIN INVALIDE");
                    throw new Error("ERREUR RADAR");
                }
                radarChannels = await response.json();
                renderSelectedList();
                hideLoading();
            } catch (e) {
                hideLoading();
                alert(`ÉCHEC DU BALAYAGE : ${e.message}`);
                if (e.message.includes('PIN')) window.location.reload();
            }
        }

        function renderSelectedList() {
            selectedContainer.innerHTML = '';
            if (selectedChannelIds.size === 0) {
                selectedContainer.innerHTML = '<div style="text-align: center; padding: 20px; color: #555;">AUCUN SECTEUR CIBLÉ. SYSTEME INOFFENSIF.</div>';
                return;
            }
            selectedChannelIds.forEach(id => {
                const channelData = radarChannels.find(c => c.id === id);
                const itemDiv = document.createElement('div');
                itemDiv.className = 'channel-item active-target';

                if (channelData) {
                    itemDiv.innerHTML = `
                        <div class="channel-name">[${channelData.guild}] #${channelData.channel}</div>
                        <div class="channel-users">Cibles exposées : ${channelData.users.join(', ')}</div>
                        <button class="remove-btn" onclick="removeChannel('${id}')">X</button>
                    `;
                } else {
                    itemDiv.innerHTML = `
                        <div class="channel-name" style="color:gray;">[ZÔNE RADAR INCONNUE]</div>
                        <div class="channel-users">ID: ${id} (Accès potentiellement perdu)</div>
                        <button class="remove-btn" onclick="removeChannel('${id}')">X</button>
                    `;
                }
                selectedContainer.appendChild(itemDiv);
            });
        }

        function openModal() {
            modalOverlay.classList.remove('hidden');
            modalSearchInput.value = '';
            renderModalList();
        }

        function closeModal() { modalOverlay.classList.add('hidden'); }

        function renderModalList() {
            modalContainer.innerHTML = '';
            const searchTerm = modalSearchInput.value.toLowerCase().trim();

            if (radarChannels.length === 0) {
                modalContainer.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--color-danger);">AUCUNE CIBLE DÉTECTÉE PAR LE RADAR.</div>';
                return;
            }

            const filteredChannels = radarChannels.filter(channelData => {
                const searchableText = `${channelData.guild} ${channelData.channel} ${channelData.users.join(' ')}`.toLowerCase();
                return searchableText.includes(searchTerm);
            });

            if (filteredChannels.length === 0) {
                modalContainer.innerHTML = '<div style="text-align: center; padding: 20px; color: #555;">AUCUN SECTEUR NE CORRESPOND AUX CRITÈRES.</div>';
                return;
            }

            filteredChannels.forEach(channelData => {
                const isSelected = selectedChannelIds.has(channelData.id);
                const itemDiv = document.createElement('div');
                itemDiv.className = `modal-item ${isSelected ? 'selected' : ''}`;
                itemDiv.onclick = () => toggleChannelSelection(channelData.id);

                itemDiv.innerHTML = `
                    <div class="channel-name">[${channelData.guild}] #${channelData.channel}</div>
                    <div class="channel-users">Cibles exposées : ${channelData.users.join(', ')}</div>
                    ${isSelected ? '<div style="font-size:0.7em; margin-top:5px;">[VERROUILLÉ]</div>' : ''}
                `;
                modalContainer.appendChild(itemDiv);
            });
        }

        function toggleChannelSelection(channelId) {
            if (selectedChannelIds.has(channelId)) selectedChannelIds.delete(channelId);
            else selectedChannelIds.add(channelId);
            renderSelectedList(); 
            renderModalList(); 
        }

        function removeChannel(channelId) {
            selectedChannelIds.delete(channelId);
            renderSelectedList();
        }

        function updateUIStatus() {
            if (isSystemActive) {
                statusText.innerText = "🚨 CIBLAGE ACTIF 🚨";
                statusText.className = "status-active";
                fireButton.innerText = "INITIER PROTOCOLE DE DÉSESCALADE";
                fireButton.className = "active-mode";
                manualStrikeContainer.classList.remove('hidden'); // Affiche le bouton Tir Manuel
            } else {
                statusText.innerText = "STANDBY / EN ATTENTE d'ORDRE";
                statusText.className = "status-inactive";
                fireButton.innerText = "ARMEZ LE SYSTÈME";
                fireButton.className = "arm-mode";
                manualStrikeContainer.classList.add('hidden'); // Cache le bouton Tir Manuel
            }
        }

        async function toggleSystem() {
            const newActiveState = !isSystemActive;
            const channelsArray = Array.from(selectedChannelIds);

            if (newActiveState && channelsArray.length === 0) {
                alert("ERREUR STRATÉGIQUE : AUCUN SECTEUR VERROUILLÉ.");
                return;
            }

            const action = newActiveState ? "D'ACTIVATION" : "DE DÉSACTIVATION";
            if (!confirm(`CONFIRMER L'ORDRE ${action} DU PROTOCOLE TITI.EXE ?`)) return;

            showLoading(newActiveState ? "ARMEMENT DES MISSILS..." : "DÉSACTIVATION EN COURS...");
            if ('vibrate' in navigator) navigator.vibrate([100, 50, 100, 50, 500]); 

            try {
                const response = await fetch(`${API_BASE_URL}/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-PIN': userPin },
                    body: JSON.stringify({ isActive: newActiveState, channels: channelsArray })
                });

                const result = await response.json();
                
                if (result.success) {
                    isSystemActive = newActiveState;
                    setTimeout(() => { 
                        hideLoading();
                        updateUIStatus();
                    }, 1500);
                } else {
                    throw new Error(result.error || "Réponse inattendue du serveur");
                }
            } catch (e) {
                hideLoading();
                alert(`ÉCHEC CRITIQUE : ${e.message}`);
                if (e.message.includes('PIN')) window.location.reload();
            }
        }

        // --- FRAPPE MANUELLE ---
        async function forcePing() {
            if (!confirm("⚠️ AUTORISER LA FRAPPE MANUELLE IMMÉDIATE ?")) return;

            showLoading("CALCUL DE LA TRAJECTOIRE...");
            if ('vibrate' in navigator) navigator.vibrate([200, 100, 200]);

            try {
                const response = await fetch(`${API_BASE_URL}/force-ping`, {
                    method: 'POST',
                    headers: { 'X-PIN': userPin }
                });

                const result = await response.json();
                hideLoading();

                if (response.ok) {
                    // Flash d'écran (Le recul de l'arme)
                    document.body.style.backgroundColor = "white";
                    setTimeout(() => document.body.style.backgroundColor = "var(--color-bg)", 100);
                    
                    alert("💥 FRAPPE EFFECTUÉE : La cible a été touchée avec succès.");
                } else {
                    alert(`ÉCHEC DU TIR : ${result.error}`);
                }
            } catch (e) {
                hideLoading();
                alert(`ERREUR DE CONNEXION : ${e.message}`);
            }
        }

        // --- UTILITAIRES ---
        function showLoading(text) {
            loadingMainText.innerText = text;
            loadingOverlay.classList.remove('hidden');
        }

        function hideLoading() { loadingOverlay.classList.add('hidden'); }

        pinInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") authenticate();
        });
    </script>
</body>
</html>
