<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOCOLE JUPITER - SYSTEME TITI.EXE</title>
    <style>
        /* --- STYLE BRUTALISTE & MILITAIRE --- */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --color-danger: #ff0000;
            --color-safe: #00ff00;
            --color-bg: #000000;
            --color-text: #ff3333;
            --glow: 0 0 10px rgba(255, 0, 0, 0.7);
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            position: relative;
        }

        /* --- EFFET SCANLINE & GRAIN --- */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
            opacity: 0.3;
        }

        /* --- CONTENEUR PRINCIPAL --- */
        #console-container {
            border: 2px solid var(--color-text);
            padding: 20px;
            width: 95%;
            max-width: 650px;
            box-shadow: var(--glow);
            position: relative;
            background: rgba(10, 0, 0, 0.85);
            max-height: 95vh;
            display: flex;
            flex-direction: column;
        }

        #header {
            text-align: center;
            border-bottom: 2px solid var(--color-text);
            padding-bottom: 10px;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        #status-display {
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
            padding: 5px;
            border: 1px dashed var(--color-text);
            flex-shrink: 0;
        }

        .status-active { color: var(--color-danger); text-shadow: var(--glow); animation: blink 0.5s infinite; }
        .status-inactive { color: #555; }

        /* --- LISTE DES SALONS (RADAR) --- */
        .input-group {
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        #radar-container {
            flex-grow: 1;
            overflow-y: auto;
            border: 1px solid var(--color-text);
            background: #0a0000;
            padding: 5px;
            margin-bottom: 15px;
            min-height: 150px;
        }

        .channel-item {
            border: 1px dashed #550000;
            padding: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }

        .channel-item:hover {
            background: rgba(255, 0, 0, 0.1);
            border-color: var(--color-danger);
        }

        .channel-item.selected {
            background: var(--color-danger);
            color: var(--color-bg);
            border: 1px solid var(--color-danger);
            box-shadow: var(--glow);
        }

        .channel-name { font-weight: bold; font-size: 1.1em; }
        
        .channel-users {
            font-size: 0.85em;
            color: #aaa;
            margin-top: 4px;
            text-transform: none; 
        }
        
        .channel-item.selected .channel-users { color: #330000; font-weight: bold; }

        .radar-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .radar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .radar-btn {
            background: transparent;
            border: 1px solid var(--color-text);
            color: var(--color-text);
            padding: 5px 10px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
        }
        .radar-btn:hover { background: var(--color-danger); color: var(--color-bg); }

        /* --- FORMULAIRES & RECHERCHE --- */
        input[type="text"], input[type="password"] {
            width: 100%;
            background-color: #1a0000;
            border: 1px solid var(--color-text);
            color: var(--color-danger);
            font-family: 'Share Tech Mono', monospace;
            padding: 10px;
            box-sizing: border-box;
            font-size: 1em;
        }

        input[type="password"] {
            font-size: 1.2em;
            text-align: center;
            letter-spacing: 5px;
        }

        input[type="text"]::placeholder { color: #660000; }
        input:focus { outline: none; box-shadow: var(--glow); }

        /* --- LE GROS BOUTON --- */
        #fire-button-container { text-align: center; flex-shrink: 0; }

        #fire-button {
            background-color: #330000;
            border: 4px solid var(--color-danger);
            color: var(--color-danger);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.8em;
            font-weight: bold;
            padding: 15px 30px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: var(--glow);
            transition: all 0.2s;
            width: 100%;
        }

        #fire-button:hover {
            background-color: var(--color-danger);
            color: var(--color-bg);
            box-shadow: 0 0 20px var(--color-danger);
        }

        #fire-button:active { transform: scale(0.98); }

        #fire-button.active-mode {
            background-color: var(--color-bg);
            border-color: #444;
            color: #444;
            box-shadow: none;
        }
        #fire-button.active-mode:hover { background-color: #222; }

        /* --- ANIMATIONS & UTILITAIRES --- */
        @keyframes blink { 50% { opacity: 0; } }
        .hidden { display: none !important; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
            font-size: 2em;
            color: var(--color-danger);
            text-align: center;
        }
        
        .loader-text { margin-top: 20px; font-size: 0.6em; color: #aaa; animation: blink 1s infinite;}
    </style>
</head>
<body>

    <div id="loading-overlay" class="hidden">
        <div id="loading-main-text">TRAITEMENT EN COURS...</div>
        <div class="loader-text" id="loading-sub-text">Attente de réponse du système Jupiter</div>
    </div>

    <div id="console-container">
        <div id="header">
            <div>République Française</div>
            <div style="font-size: 1.2em; font-weight: bold;">COMMANDEMENT DES FORCES STRATÉGIQUES</div>
            <div style="color:white">-- CONFIDENTIEL DÉFENSE --</div>
            <div>PC Jupiter - Système "TITI.EXE"</div>
        </div>

        <div id="auth-section">
            <div class="input-group">
                <label style="text-align:center;">CODE D'AUTORISATION REQUIS :</label>
                <input type="password" id="pin-input" placeholder="XXXXXX" maxlength="20">
            </div>
            <button id="fire-button" style="font-size:1.2em; padding: 10px;" onclick="authenticate()">DÉVERROUILLER</button>
        </div>

        <div id="control-panel" class="hidden" style="display: flex; flex-direction: column; flex-grow: 1;">
            <div id="status-display">
                État du Système : <span id="status-text" class="status-inactive">STANDBY</span>
            </div>

            <div class="radar-controls">
                <div class="radar-header">
                    <label>Secteurs de Ciblage Tactique :</label>
                    <button class="radar-btn" onclick="fetchRadarData()">📡 ACTUALISER</button>
                </div>
                <input type="text" id="search-input" placeholder="FILTRER : SERVEUR, SALON OU CIBLE..." oninput="renderChannelList()">
            </div>

            <div id="radar-container">
                <div style="text-align: center; padding: 20px; color: #555;">EN ATTENTE DES DONNÉES SATELLITES...</div>
            </div>

            <div id="fire-button-container">
                <button id="fire-button" class="arm-mode" onclick="toggleSystem()">
                    ARMEZ LE SYSTÈME
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- ÉTAT GLOBAL ---
        const API_BASE_URL = '/dashboard/api';
        let userPin = '';
        let isSystemActive = false;
        let selectedChannelIds = new Set(); // Stocke les IDs des salons sélectionnés
        let radarChannels = []; // Stocke les données brutes du radar

        // --- ÉLÉMENTS DU DOM ---
        const authSection = document.getElementById('auth-section');
        const controlPanel = document.getElementById('control-panel');
        const pinInput = document.getElementById('pin-input');
        const searchInput = document.getElementById('search-input');
        const statusText = document.getElementById('status-text');
        const fireButton = document.getElementById('fire-button');
        const radarContainer = document.getElementById('radar-container');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingMainText = document.getElementById('loading-main-text');

        // --- 1. AUTHENTIFICATION ---
        function authenticate() {
            userPin = pinInput.value.trim();
            if (!userPin) { alert("ERREUR : CODE REQUIS."); return; }
            
            showLoading("DÉVERROUILLAGE SÉCURISÉ...");
            
            authSection.classList.add('hidden');
            controlPanel.classList.remove('hidden');
            
            initDashboard();
        }

        // --- 2. INITIALISATION DU DASHBOARD ---
        async function initDashboard() {
            try {
                const statusRes = await fetch(`${API_BASE_URL}/status`);
                if (!statusRes.ok) throw new Error("Erreur de liaison");
                const statusData = await statusRes.json();
                
                isSystemActive = statusData.isActive;
                selectedChannelIds = new Set(statusData.allowedChannels);
                
                updateUIStatus();
                await fetchRadarData();
            } catch (e) {
                hideLoading();
                alert("CONNEXION AU PC JUPITER PERDUE.");
                window.location.reload();
            }
        }

        // --- 3. BALAYAGE RADAR ---
        async function fetchRadarData() {
            showLoading("BALAYAGE SATELLITE EN COURS...");
            try {
                const response = await fetch(`${API_BASE_URL}/radar`, {
                    headers: { 'X-PIN': userPin }
                });
                
                if (!response.ok) {
                    if(response.status === 401) throw new Error("PIN INVALIDE");
                    throw new Error("ERREUR RADAR");
                }
                
                radarChannels = await response.json();
                renderChannelList();
                hideLoading();
            } catch (e) {
                hideLoading();
                alert(`ÉCHEC DU BALAYAGE : ${e.message}`);
                if (e.message.includes('PIN')) window.location.reload();
            }
        }

        // --- 4. AFFICHAGE ET FILTRAGE DES SALONS ---
        function renderChannelList() {
            radarContainer.innerHTML = '';
            const searchTerm = searchInput.value.toLowerCase().trim();

            if (radarChannels.length === 0) {
                radarContainer.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--color-danger);">AUCUNE CIBLE POTENTIELLE DÉTECTÉE SUR LE RÉSEAU.</div>';
                return;
            }

            // Filtrer les données en fonction de la recherche globale
            const filteredChannels = radarChannels.filter(channelData => {
                const searchableText = `${channelData.guild} ${channelData.channel} ${channelData.users.join(' ')}`.toLowerCase();
                return searchableText.includes(searchTerm);
            });

            if (filteredChannels.length === 0) {
                radarContainer.innerHTML = '<div style="text-align: center; padding: 20px; color: #555;">AUCUN SECTEUR NE CORRESPOND AUX CRITÈRES DE RECHERCHE.</div>';
                return;
            }

            // Afficher les résultats filtrés
            filteredChannels.forEach(channelData => {
                const isSelected = selectedChannelIds.has(channelData.id);
                
                const itemDiv = document.createElement('div');
                itemDiv.className = `channel-item ${isSelected ? 'selected' : ''}`;
                itemDiv.onclick = () => toggleChannelSelection(channelData.id, itemDiv);

                itemDiv.innerHTML = `
                    <div class="channel-name">[${channelData.guild}] #${channelData.channel}</div>
                    <div class="channel-users">Cibles exposées : ${channelData.users.join(', ')}</div>
                    ${isSelected ? '<div style="font-size:0.7em; margin-top:5px;">[VERROUILLÉ]</div>' : ''}
                `;

                radarContainer.appendChild(itemDiv);
            });
        }

        // --- 5. INTERACTION AVEC UN SALON ---
        function toggleChannelSelection(channelId, element) {
            if (selectedChannelIds.has(channelId)) {
                selectedChannelIds.delete(channelId);
            } else {
                selectedChannelIds.add(channelId);
            }
            renderChannelList(); 
        }

        // --- 6. METTRE A JOUR L'ÉTAT VISUEL DU BOUTON ---
        function updateUIStatus() {
            if (isSystemActive) {
                statusText.innerText = "🚨 CIBLAGE ACTIF 🚨";
                statusText.className = "status-active";
                fireButton.innerText = "INITIER PROTOCOLE DE DÉSESCALADE";
                fireButton.className = "active-mode";
            } else {
                statusText.innerText = "STANDBY / EN ATTENTE d'ORDRE";
                statusText.className = "status-inactive";
                fireButton.innerText = "ARMEZ LE SYSTÈME";
                fireButton.className = "arm-mode";
            }
        }

        // --- 7. FRAPPE STRATÉGIQUE (LE GROS BOUTON) ---
        async function toggleSystem() {
            const newActiveState = !isSystemActive;
            const channelsArray = Array.from(selectedChannelIds);

            if (newActiveState && channelsArray.length === 0) {
                alert("ERREUR STRATÉGIQUE : AUCUN SECTEUR VERROUILLÉ.");
                return;
            }

            const action = newActiveState ? "D'ACTIVATION" : "DE DÉSACTIVATION";
            if (!confirm(`CONFIRMER L'ORDRE ${action} DU PROTOCOLE TITI.EXE ?`)) return;

            showLoading(newActiveState ? "ARMEMENT DES MISSILS..." : "DÉSACTIVATION EN COURS...");
            if ('vibrate' in navigator) navigator.vibrate([100, 50, 100, 50, 500]); // Haptique

            try {
                const response = await fetch(`${API_BASE_URL}/config`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-PIN': userPin 
                    },
                    body: JSON.stringify({
                        isActive: newActiveState,
                        channels: channelsArray
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    isSystemActive = newActiveState;
                    setTimeout(() => { 
                        hideLoading();
                        updateUIStatus();
                    }, 1500);
                } else {
                    throw new Error(result.error || "Réponse inattendue du serveur");
                }

            } catch (e) {
                hideLoading();
                alert(`ÉCHEC CRITIQUE : ${e.message}`);
                if (e.message.includes('PIN')) window.location.reload();
            }
        }

        // --- UTILITAIRES ---
        function showLoading(text) {
            loadingMainText.innerText = text;
            loadingOverlay.classList.remove('hidden');
        }

        function hideLoading() {
            loadingOverlay.classList.add('hidden');
        }

        pinInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") authenticate();
        });
    </script>
</body>
</html>
