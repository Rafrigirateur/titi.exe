<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOCOLE JUPITER - SYSTEME TITI.EXE</title>
    <style>
        /* --- STYLE BRUTALISTE & MILITAIRE --- */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root { --color-danger: #ff0000; --color-safe: #00ff00; --color-bg: #000000; --color-text: #ff3333; --glow: 0 0 10px rgba(255, 0, 0, 0.7); }

        body {
            background-color: var(--color-bg); color: var(--color-text); font-family: 'Share Tech Mono', monospace; text-transform: uppercase;
            overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; position: relative; transition: background-color 0.1s;
        }

        body::before {
            content: " "; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%); background-size: 100% 4px; z-index: 100; pointer-events: none; opacity: 0.3;
        }

        #console-container {
            border: 2px solid var(--color-text); padding: 20px; width: 95%; max-width: 650px; box-shadow: var(--glow); position: relative; background: rgba(10, 0, 0, 0.85); max-height: 95vh; display: flex; flex-direction: column;
        }

        #header { text-align: center; border-bottom: 2px solid var(--color-text); padding-bottom: 10px; margin-bottom: 15px; flex-shrink: 0; }
        #status-display { font-size: 1.5em; font-weight: bold; text-align: center; margin: 10px 0; padding: 5px; border: 1px dashed var(--color-text); flex-shrink: 0; }
        .status-active { color: var(--color-danger); text-shadow: var(--glow); animation: blink 0.5s infinite; }
        .status-inactive { color: #555; }

        /* --- LISTES ET PANNEAUX --- */
        .panel-container { flex-grow: 1; overflow-y: auto; border: 1px solid var(--color-text); background: #0a0000; padding: 5px; margin-bottom: 10px; min-height: 100px; max-height: 25vh; }
        .channel-item { border: 1px dashed #550000; padding: 10px; margin-bottom: 5px; display: flex; flex-direction: column; position: relative; }
        .channel-item.active-target { background: rgba(255, 0, 0, 0.1); border: 1px solid var(--color-danger); }
        .channel-name { font-weight: bold; font-size: 1.1em; padding-right: 30px; }
        .channel-users { font-size: 0.85em; color: #aaa; margin-top: 4px; text-transform: none; }
        
        .remove-btn { position: absolute; top: 10px; right: 10px; background: transparent; border: 1px solid var(--color-danger); color: var(--color-danger); font-family: 'Share Tech Mono', monospace; cursor: pointer; padding: 2px 6px; font-size: 1em; font-weight: bold; }
        .remove-btn:hover { background: var(--color-danger); color: var(--color-bg); }

        .radar-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; flex-shrink: 0; }
        .radar-btn { background: transparent; border: 1px solid var(--color-text); color: var(--color-text); padding: 5px 10px; cursor: pointer; font-family: 'Share Tech Mono', monospace; transition: all 0.2s; }
        .radar-btn:hover { background: var(--color-danger); color: var(--color-bg); }
        .add-target-btn { width: 100%; border-style: dashed; margin-bottom: 15px; padding: 10px; font-size: 1.1em; flex-shrink: 0; }

        #fire-button-container { text-align: center; flex-shrink: 0; }
        #fire-button { background-color: #330000; border: 4px solid var(--color-danger); color: var(--color-danger); font-family: 'Share Tech Mono', monospace; font-size: 1.8em; font-weight: bold; padding: 15px 30px; cursor: pointer; text-transform: uppercase; box-shadow: var(--glow); transition: all 0.2s; width: 100%; }
        #fire-button:hover { background: var(--color-danger); color: var(--color-bg); box-shadow: 0 0 20px var(--color-danger); }
        #fire-button:active { transform: scale(0.98); }
        #fire-button.active-mode { background: var(--color-bg); border-color: #444; color: #444; box-shadow: none; }
        #fire-button.active-mode:hover { background: #222; }

        /* --- CIBLES ET COMPTE À REBOURS --- */
        .target-user-item { display: flex; align-items: center; border: 1px dashed #550000; padding: 10px; margin-bottom: 5px; cursor: default; }
        .target-user-item.clickable { cursor: pointer; }
        .target-user-item.clickable:hover { background: rgba(255, 0, 0, 0.1); border-color: var(--color-danger); }
        .target-user-item.selected { background: var(--color-danger); color: var(--color-bg); border: 1px solid var(--color-danger); }
        .target-avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--color-text); margin-right: 15px; }
        .target-name { font-weight: bold; text-transform: none; }
        .countdown { color: #ffaa00; font-weight: bold; }

        /* --- MODALS --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center; z-index: 500; backdrop-filter: blur(3px); }
        .modal-content { border: 2px solid var(--color-danger); background: #050000; width: 90%; max-width: 600px; max-height: 85vh; display: flex; flex-direction: column; padding: 15px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); }
        .modal-list-container { flex-grow: 1; overflow-y: auto; border: 1px solid var(--color-text); background: #0a0000; padding: 5px; margin-top: 10px; max-height: 40vh;}
        
        .modal-item { border: 1px dashed #550000; padding: 10px; margin-bottom: 5px; cursor: pointer; display: flex; flex-direction: column; }
        .modal-item:hover { background: rgba(255, 0, 0, 0.1); border-color: var(--color-danger); }
        .modal-item.selected { background: var(--color-danger); color: var(--color-bg); border: 1px solid var(--color-danger); box-shadow: var(--glow); }

        input[type="text"], input[type="password"] { width: 100%; background-color: #1a0000; border: 1px solid var(--color-text); color: var(--color-danger); font-family: 'Share Tech Mono', monospace; padding: 10px; box-sizing: border-box; font-size: 1em; }
        input[type="password"] { font-size: 1.2em; text-align: center; letter-spacing: 5px; }
        input:focus { outline: none; box-shadow: var(--glow); }

        @keyframes blink { 50% { opacity: 0; } }
        .hidden { display: none !important; }

        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; font-size: 2em; color: var(--color-danger); text-align: center; }
        .loader-text { margin-top: 20px; font-size: 0.6em; color: #aaa; animation: blink 1s infinite;}
    </style>
</head>
<body>

    <div id="loading-overlay" class="hidden">
        <div id="loading-main-text">TRAITEMENT EN COURS...</div>
        <div class="loader-text" id="loading-sub-text">Attente de réponse du système Jupiter</div>
    </div>

    <div id="radar-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="radar-controls">
                <label>BASE DE DONNÉES RADAR</label>
                <button class="radar-btn" onclick="closeRadarModal()">FERMER [X]</button>
            </div>
            <input type="text" id="modal-search-input" placeholder="FILTRER : SERVEUR, SALON OU CIBLE..." oninput="renderRadarModalList()">
            <div id="modal-radar-container" class="modal-list-container"></div>
        </div>
    </div>

    <div id="strike-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="radar-controls">
                <label style="color:#ffaa00;">⚠️ SÉLECTION DE LA CIBLE</label>
                <button class="radar-btn" onclick="closeStrikeModal()">ANNULER</button>
            </div>
            
            <div style="margin-top:10px; font-size:0.9em; color:#aaa;">1. CIBLE À MARABOUTER</div>
            <div id="strike-users-container" class="modal-list-container" style="max-height: 20vh;"></div>

            <div style="margin-top:10px; font-size:0.9em; color:#aaa;">2. SECTEUR DE FRAPPE</div>
            <div id="strike-channels-container" class="modal-list-container" style="max-height: 20vh;"></div>

            <button id="confirm-strike-btn" class="radar-btn" style="margin-top:15px; width:100%; font-size:1.5em; padding:10px; color:#ffaa00; border-color:#ffaa00;" onclick="executeStrike()">
                ENGAGER LA FRAPPE 💥
            </button>
        </div>
    </div>

    <div id="console-container">
        <div id="header">
            <div>République Française</div>
            <div style="font-size: 1.2em; font-weight: bold;">COMMANDEMENT DES FORCES STRATÉGIQUES</div>
            <div style="color:white">-- CONFIDENTIEL DÉFENSE --</div>
            <div>PC Jupiter - Système "TITI.EXE"</div>
        </div>

        <div id="auth-section">
            <div class="input-group">
                <label style="text-align:center;">CODE D'AUTORISATION REQUIS :</label>
                <input type="password" id="pin-input" placeholder="XXXXXX" maxlength="20">
            </div>
            <button id="fire-button" style="font-size:1.2em; padding: 10px;" onclick="authenticate()">DÉVERROUILLER</button>
        </div>

        <div id="control-panel" class="hidden" style="display: flex; flex-direction: column; flex-grow: 1;">
            
            <div id="status-display">
                État du Système : <span id="status-text" class="status-inactive">STANDBY</span>
            </div>

            <div class="radar-controls" style="margin-top: 5px;">
                <label style="color:#ffaa00;">CIBLES SOUS MALÉDICTION :</label>
                <button class="radar-btn" onclick="fetchLiveTargets()">🔄 RAFRAÎCHIR</button>
            </div>
            <div id="live-targets-container" class="panel-container" style="max-height: 20vh; border-color:#ffaa00;"></div>

            <div class="radar-controls" style="margin-top: 5px;">
                <label>SECTEURS VERROUILLÉS :</label>
                <button class="radar-btn" onclick="fetchRadarData()">📡 ACTUALISER</button>
            </div>
            <div id="selected-channels-container" class="panel-container" style="max-height: 20vh;"></div>

            <button class="radar-btn add-target-btn" onclick="openRadarModal()">[+] ASSIGNER UNE NOUVELLE ZÔNE</button>

            <div id="manual-strike-container" class="hidden" style="margin-bottom: 15px;">
                <button class="radar-btn" style="width: 100%; border-color: #ffaa00; color: #ffaa00; font-size: 1.2em; padding: 10px; font-weight: bold; background: rgba(255, 170, 0, 0.1);" onclick="openStrikeModal()">
                    ⚠️ ORDONNER UN TIR MANUEL
                </button>
            </div>

            <div id="fire-button-container">
                <button id="fire-button" class="arm-mode" onclick="toggleSystem()">
                    ARMEZ LE SYSTÈME
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/dashboard/api';
        let userPin = '';
        let isSystemActive = false;
        let selectedChannelIds = new Set(); 
        let radarChannels = []; 
        let liveTargetsData = [];

        // Variables Frappe Manuelle
        let strikeData = { users: [], channels: [] };
        let selectedStrikeUser = null;
        let selectedStrikeChannel = null;

        const authSection = document.getElementById('auth-section');
        const controlPanel = document.getElementById('control-panel');
        const pinInput = document.getElementById('pin-input');
        const statusText = document.getElementById('status-text');
        const fireButton = document.getElementById('fire-button');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingMainText = document.getElementById('loading-main-text');
        
        const selectedContainer = document.getElementById('selected-channels-container');
        const liveTargetsContainer = document.getElementById('live-targets-container');
        const manualStrikeContainer = document.getElementById('manual-strike-container');

        const radarModal = document.getElementById('radar-modal');
        const modalRadarContainer = document.getElementById('modal-radar-container');
        const modalSearchInput = document.getElementById('modal-search-input');
        
        const strikeModal = document.getElementById('strike-modal');
        const strikeUsersContainer = document.getElementById('strike-users-container');
        const strikeChannelsContainer = document.getElementById('strike-channels-container');

        function authenticate() {
            userPin = pinInput.value.trim();
            if (!userPin) { alert("ERREUR : CODE REQUIS."); return; }
            showLoading("DÉVERROUILLAGE SÉCURISÉ...");
            authSection.classList.add('hidden');
            controlPanel.classList.remove('hidden');
            initDashboard();
        }

        async function initDashboard() {
            try {
                const statusRes = await fetch(`${API_BASE_URL}/status`);
                if (!statusRes.ok) throw new Error("Erreur de liaison");
                const statusData = await statusRes.json();
                
                isSystemActive = statusData.isActive;
                selectedChannelIds = new Set(statusData.allowedChannels);
                
                updateUIStatus();
                await fetchRadarData();
                await fetchLiveTargets(); // Charge les cibles
            } catch (e) {
                hideLoading();
                alert("CONNEXION AU PC JUPITER PERDUE.");
                window.location.reload();
            }
        }

        // --- GESTION DES CIBLES ET COMPTE A REBOURS ---
        async function fetchLiveTargets() {
            try {
                const response = await fetch(`${API_BASE_URL}/live-targets`, { headers: { 'X-PIN': userPin } });
                if (response.ok) {
                    liveTargetsData = await response.json();
                    renderLiveTargets();
                }
            } catch (e) {}
        }

        function renderLiveTargets() {
            liveTargetsContainer.innerHTML = '';
            
            if (liveTargetsData.length === 0) {
                liveTargetsContainer.innerHTML = '<div style="text-align: center; padding: 20px; color: #555;">AUCUNE CIBLE ENREGISTRÉE.<br><br><i>Utilisez /malediction dans Discord pour désigner une victime.</i></div>';
                return;
            }

            liveTargetsData.forEach(target => {
                const div = document.createElement('div');
                div.className = 'target-user-item';

                let statusHtml = '';
                if (!isSystemActive) {
                    statusHtml = '<span style="color:gray;">SYSTÈME EN PAUSE</span>';
                } else if (target.nextPingTime) {
                    // On enregistre le timestamp dans l'attribut HTML
                    statusHtml = `<span class="countdown" data-time="${target.nextPingTime}">CALCUL...</span>`;
                } else {
                    statusHtml = '<span style="color:#ffaa00;">EN ATTENTE DE SECTEUR VERROUILLÉ</span>';
                }

                div.innerHTML = `
                    <img src="${target.avatar}" class="target-avatar">
                    <div style="flex-grow:1;">
                        <div class="target-name">${target.username}</div>
                        <div style="font-size:0.85em; color:#aaa; margin-top:3px;">Impact prévu : ${statusHtml}</div>
                    </div>
                `;
                liveTargetsContainer.appendChild(div);
            });
        }

        // Tâche de fond pour animer le compte à rebours toutes les secondes
        setInterval(() => {
            if (!isSystemActive) return;
            const elements = document.querySelectorAll('.countdown');
            const now = Date.now();

            elements.forEach(el => {
                const targetTime = parseInt(el.getAttribute('data-time'));
                if (!targetTime) return;

                const diff = targetTime - now;
                if (diff <= 0) {
                    el.innerText = "💥 FRAPPE IMMINENTE !";
                    el.style.color = "var(--color-danger)";
                    el.style.animation = "blink 0.2s infinite";
                } else {
                    const totalSeconds = Math.floor(diff / 1000);
                    const h = Math.floor(totalSeconds / 3600);
                    const m = Math.floor((totalSeconds % 3600) / 60);
                    const s = totalSeconds % 60;
                    
                    let timeStr = '';
                    if (h > 0) timeStr += `${h}h `;
                    if (m > 0 || h > 0) timeStr += `${m}m `;
                    timeStr += `${s}s`;
                    
                    el.innerText = `dans ${timeStr}`;
                }
            });
        }, 1000);

        // Rafraîchir les données des cibles toutes les 30s
        setInterval(() => { if (userPin && !document.hidden) fetchLiveTargets(); }, 30000);


        // --- GESTION RADAR & SECTEURS ---
        async function fetchRadarData() {
            try {
                const response = await fetch(`${API_BASE_URL}/radar`, { headers: { 'X-PIN': userPin } });
                if (response.ok) {
                    radarChannels = await response.json();
                    renderSelectedList();
                }
            } catch (e) {}
            hideLoading();
        }

        function renderSelectedList() {
            selectedContainer.innerHTML = '';
            if (selectedChannelIds.size === 0) {
                selectedContainer.innerHTML = '<div style="text-align: center; padding: 20px; color: #555;">AUCUN SECTEUR CIBLÉ.</div>';
                return;
            }
            selectedChannelIds.forEach(id => {
                const channelData = radarChannels.find(c => c.id === id);
                const itemDiv = document.createElement('div');
                itemDiv.className = 'channel-item active-target';
                if (channelData) {
                    itemDiv.innerHTML = `
                        <div class="channel-name">[${channelData.guild}] #${channelData.channel}</div>
                        <div class="channel-users">Cibles exposées : ${channelData.users.join(', ')}</div>
                        <button class="remove-btn" onclick="removeChannel('${id}')">X</button>
                    `;
                } else {
                    itemDiv.innerHTML = `<div class="channel-name" style="color:gray;">[ZÔNE RADAR INCONNUE]</div><div class="channel-users">ID: ${id}</div><button class="remove-btn" onclick="removeChannel('${id}')">X</button>`;
                }
                selectedContainer.appendChild(itemDiv);
            });
        }

        /* --- MODAL RADAR --- */
        function openRadarModal() { radarModal.classList.remove('hidden'); modalSearchInput.value = ''; renderRadarModalList(); }
        function closeRadarModal() { radarModal.classList.add('hidden'); }
        function renderRadarModalList() {
            modalRadarContainer.innerHTML = '';
            const searchTerm = modalSearchInput.value.toLowerCase().trim();
            const filteredChannels = radarChannels.filter(c => `${c.guild} ${c.channel} ${c.users.join(' ')}`.toLowerCase().includes(searchTerm));

            if (filteredChannels.length === 0) { modalRadarContainer.innerHTML = '<div style="text-align: center; padding: 20px; color: #555;">AUCUNE ZÔNE TROUVÉE.</div>'; return; }

            filteredChannels.forEach(c => {
                const isSelected = selectedChannelIds.has(c.id);
                const itemDiv = document.createElement('div');
                itemDiv.className = `modal-item ${isSelected ? 'selected' : ''}`;
                itemDiv.onclick = () => {
                    if (selectedChannelIds.has(c.id)) selectedChannelIds.delete(c.id); else selectedChannelIds.add(c.id);
                    renderSelectedList(); renderRadarModalList(); silentSync();
                };
                itemDiv.innerHTML = `<div class="channel-name">[${c.guild}] #${c.channel}</div><div class="channel-users">Cibles exposées : ${c.users.join(', ')}</div>${isSelected ? '<div style="font-size:0.7em; margin-top:5px;">[VERROUILLÉ]</div>' : ''}`;
                modalRadarContainer.appendChild(itemDiv);
            });
        }

        function removeChannel(channelId) { selectedChannelIds.delete(channelId); renderSelectedList(); silentSync(); }

        /* --- MODAL FRAPPE MANUELLE --- */
        async function openStrikeModal() {
            showLoading("RÉCUPÉRATION DES CIBLES...");
            try {
                const res = await fetch(`${API_BASE_URL}/strike-data`, { headers: { 'X-PIN': userPin } });
                if (!res.ok) throw new Error("Erreur de connexion tactique.");
                strikeData = await res.json();
                
                selectedStrikeUser = null;
                selectedStrikeChannel = null;
                
                renderStrikeModal();
                strikeModal.classList.remove('hidden');
                hideLoading();
            } catch (e) { hideLoading(); alert(e.message); }
        }

        function closeStrikeModal() { strikeModal.classList.add('hidden'); }
        function renderStrikeModal() {
            strikeUsersContainer.innerHTML = ''; strikeChannelsContainer.innerHTML = '';
            if (strikeData.users.length === 0) {
                strikeUsersContainer.innerHTML = '<div style="padding:10px; color:gray;">Aucune cible n\'est maudite actuellement.</div>';
            } else {
                strikeData.users.forEach(u => {
                    const div = document.createElement('div');
                    div.className = `target-user-item clickable ${selectedStrikeUser === u.id ? 'selected' : ''}`;
                    div.onclick = () => { selectedStrikeUser = u.id; renderStrikeModal(); };
                    div.innerHTML = `<img src="${u.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}" class="target-avatar"><div class="target-name">${u.username}</div>`;
                    strikeUsersContainer.appendChild(div);
                });
            }

            if (strikeData.channels.length === 0) {
                strikeChannelsContainer.innerHTML = '<div style="padding:10px; color:gray;">Aucun secteur autorisé.</div>';
            } else {
                strikeData.channels.forEach(c => {
                    const div = document.createElement('div');
                    div.className = `modal-item ${selectedStrikeChannel === c.id ? 'selected' : ''}`;
                    div.onclick = () => { selectedStrikeChannel = c.id; renderStrikeModal(); };
                    div.innerHTML = `<div class="channel-name">[${c.guild}] #${c.name}</div>`;
                    strikeChannelsContainer.appendChild(div);
                });
            }
        }

        async function executeStrike() {
            if (!selectedStrikeUser || !selectedStrikeChannel) { alert("VEUILLEZ SÉLECTIONNER UNE CIBLE ET UN SECTEUR."); return; }
            closeStrikeModal(); showLoading("CALCUL DE LA TRAJECTOIRE...");
            if ('vibrate' in navigator) navigator.vibrate([200, 100, 200]);

            try {
                const response = await fetch(`${API_BASE_URL}/force-ping`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-PIN': userPin },
                    body: JSON.stringify({ targetId: selectedStrikeUser, channelId: selectedStrikeChannel })
                });
                hideLoading();
                if (response.ok) {
                    document.body.style.backgroundColor = "white";
                    setTimeout(() => document.body.style.backgroundColor = "var(--color-bg)", 100);
                    setTimeout(fetchLiveTargets, 1000); // Met à jour le chronomètre qui va boucler après le tir
                } else { const result = await response.json(); alert(`ÉCHEC DU TIR : ${result.error}`); }
            } catch (e) { hideLoading(); alert(`ERREUR DE CONNEXION : ${e.message}`); }
        }

        /* --- SYSTÈME GLOBAL --- */
        function updateUIStatus() {
            if (isSystemActive) {
                statusText.innerText = "🚨 CIBLAGE ACTIF 🚨"; statusText.className = "status-active";
                fireButton.innerText = "INITIER PROTOCOLE DE DÉSESCALADE"; fireButton.className = "active-mode";
                manualStrikeContainer.classList.remove('hidden');
            } else {
                statusText.innerText = "STANDBY / EN ATTENTE d'ORDRE"; statusText.className = "status-inactive";
                fireButton.innerText = "ARMEZ LE SYSTÈME"; fireButton.className = "arm-mode";
                manualStrikeContainer.classList.add('hidden');
            }
        }

        async function toggleSystem() {
            const newActiveState = !isSystemActive;
            const channelsArray = Array.from(selectedChannelIds);
            if (newActiveState && channelsArray.length === 0) { alert("ERREUR STRATÉGIQUE : AUCUN SECTEUR VERROUILLÉ."); return; }
            if (!confirm(`CONFIRMER L'ORDRE ${newActiveState ? "D'ACTIVATION" : "DE DÉSACTIVATION"} ?`)) return;

            showLoading(newActiveState ? "ARMEMENT DES MISSILS..." : "DÉSACTIVATION EN COURS...");
            if ('vibrate' in navigator) navigator.vibrate([100, 50, 100, 50, 500]); 

            try {
                const response = await fetch(`${API_BASE_URL}/config`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-PIN': userPin },
                    body: JSON.stringify({ isActive: newActiveState, channels: channelsArray })
                });

                if (response.ok) {
                    isSystemActive = newActiveState;
                    setTimeout(() => { hideLoading(); updateUIStatus(); fetchLiveTargets(); }, 1500); // Actualise les cibles
                }
            } catch (e) { hideLoading(); alert(`ÉCHEC CRITIQUE : ${e.message}`); }
        }

        async function silentSync() {
            if (!userPin) return; 
            try {
                await fetch(`${API_BASE_URL}/config`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'X-PIN': userPin },
                    body: JSON.stringify({ isActive: isSystemActive, channels: Array.from(selectedChannelIds) })
                });
                fetchLiveTargets(); // Met à jour le status de "En attente de salon" à "Calcul..." silencieusement
            } catch (e) {}
        }

        function showLoading(text) { loadingMainText.innerText = text; loadingOverlay.classList.remove('hidden'); }
        function hideLoading() { loadingOverlay.classList.add('hidden'); }
        pinInput.addEventListener("keypress", function(event) { if (event.key === "Enter") authenticate(); });
    </script>
</body>
</html>
